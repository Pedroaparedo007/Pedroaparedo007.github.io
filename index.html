<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Web Gateway</title>
    <style>
        /* Base styles to center everything and look professional */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212;
            color: #ffffff;
        }

        /* Container for the proxy card */
        .proxy-container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            text-align: center;
        }

        /* Styling for the titles */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a0a0a0;
            font-size: 1rem;
            margin-bottom: 35px;
        }

        /* Custom alignment rules for the injected Reflect4 form elements */
        #r4-widget-form {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Footer notice */
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="proxy-container">
        <h1>Web Gateway</h1>
        <p>Enter a web address below to browse securely.</p>

        <!-- Your Active Reflect4 Widget -->
        <div id="r4-widget-form"></div> 
        <script async src="https://www.my-private-node-999.com/widget/widget.js" data-id="r4-widget-connection"></script>

        <div class="footer">
            Powered by Reflect4 Engine • Hosted on Cloudflare Pages
        </div>
    </div>

</body>
</html>
