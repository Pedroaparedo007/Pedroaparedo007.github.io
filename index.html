<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloudflare Proxy Hub</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #111; color: #fff; }
        .box { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        input { flex: 1; padding: 12px; border-radius: 4px; border: 1px solid #333; background: #222; color: #fff; }
        button { padding: 12px 20px; background: #f60; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Secure Proxy Gateway</h2>
    <div class="box">
        <input type="text" id="targetUrl" placeholder="Enter website URL (e.g., https://google.com)">
        <button onclick="redirectThroughReflect()">Browse</button>
    </div>

    <script>
        function redirectThroughReflect() {
            const urlInput = document.getElementById('targetUrl').value;
            if (urlInput) {
                // This routes the input directly through Reflect4's public nodes 
                // completely bypassing the domain ownership check error.
                const cleanUrl = encodeURIComponent(urlInput);
                window.location.href = `https://reflect4.me{cleanUrl}`;
            }
        }
    </script>
</body>
</html>
